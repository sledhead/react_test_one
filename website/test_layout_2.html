<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legacy Photo Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,700;1,400&family=Homemade+Apple&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #fdfaf3;
            --sepia: #8b5e3c;
            --sepia-light: #bc987e;
            --sepia-dark: #5d3a24;
        }

        body {
            background-color: var(--cream);
            color: var(--sepia-dark);
            font-family: 'Lora', serif;
            scroll-behavior: smooth;
        }

        .font-display { font-family: 'Playfair Display', serif; }
        .font-script { font-family: 'Homemade Apple', cursive; }

        /* Polaroid Effect */
        .polaroid-frame {
            background: white;
            padding: 1.5rem 1.5rem 4rem 1.5rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            transform: rotate(-1deg);
            transition: transform 0.3s ease;
        }
        .polaroid-frame:hover {
            transform: rotate(0deg);
        }

        /* Hover Transitions */
        .sepia-img {
            filter: sepia(100%) brightness(90%) contrast(90%);
            transition: filter 0.6s ease;
        }
        .sepia-img:hover {
            filter: sepia(0%) brightness(100%) contrast(100%);
        }

        /* Journal/Lined Paper Effect */
        .journal-paper {
            background-color: #fffdf5;
            background-image: linear-gradient(#e5e0d0 1px, transparent 1px);
            background-size: 100% 2.5rem;
            line-height: 2.5rem;
            padding: 2.5rem;
            border-left: 2px solid #d4cdb4;
            position: relative;
        }
        
        .drop-cap::first-letter {
            float: left;
            font-family: 'Playfair Display', serif;
            font-size: 4.5rem;
            line-height: 4rem;
            padding-right: 0.75rem;
            color: var(--sepia);
        }

        /* Custom Scrollbar */
        .custom-scroll::-webkit-scrollbar {
            height: 6px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: #eee6d8;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: var(--sepia-light);
            border-radius: 10px;
        }

        /* Map Placeholder Style */
        .map-box {
            background: #e8e2d4;
            border: 1px dashed var(--sepia);
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            color: var(--sepia);
        }

        /* Lightbox Blur */
        #lightbox {
            backdrop-filter: blur(8px);
            display: none;
        }
        
        .animate-fade-in {
            animation: fadeIn 0.4s ease forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .sticky-nav {
            background: rgba(253, 250, 243, 0.85);
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Header Navigation -->
    <header class="sticky-nav fixed top-0 w-full z-40 border-b border-stone-200">
        <nav class="container mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="font-display text-2xl font-bold tracking-tighter text-sepia">THE ARCHIVE</h1>
            <ul class="flex space-x-8 text-sm uppercase tracking-widest font-medium opacity-80">
                <li><a href="#" class="hover:text-sepia transition">Home</a></li>
                <li><a href="#" class="hover:text-sepia transition">Collections</a></li>
                <li><a href="#" class="hover:text-sepia transition">Timeline</a></li>
                <li><a href="#" class="hover:text-sepia transition">About</a></li>
            </ul>
        </nav>
    </header>

    <!-- Main Content Area -->
    <main class="flex-grow pt-24 pb-12 container mx-auto px-4">
        
        <div id="photo-display-container">
            <!-- Content Injected by JS -->
        </div>

        <!-- Journal Expansion Section (Conditional) -->
        <div id="journal-section" class="max-w-5xl mx-auto mt-12 hidden">
            <div class="journal-paper shadow-lg border border-stone-200">
                <div class="flex flex-col md:flex-row gap-8">
                    <!-- Text Content -->
                    <div class="flex-1">
                        <div id="journal-content" class="text-lg text-stone-700 leading-relaxed italic">
                            <!-- Story injected here -->
                        </div>
                    </div>
                    
                    <!-- Meta Column -->
                    <div class="w-full md:w-64 space-y-6">
                        <div class="bg-white/50 p-4 border border-stone-200 rounded-sm shadow-sm text-sm">
                            <h4 class="font-display font-bold uppercase tracking-wider mb-3 border-b border-stone-100 pb-2">Quick Info</h4>
                            <div id="meta-info" class="space-y-2">
                                <!-- Info injected here -->
                            </div>
                        </div>

                        <div class="bg-white/50 p-4 border border-stone-200 rounded-sm shadow-sm text-sm">
                            <h4 class="font-display font-bold uppercase tracking-wider mb-3 border-b border-stone-100 pb-2">Location</h4>
                            <div class="map-box mb-2">
                                [ Map Visualization ]
                            </div>
                            <p class="text-xs italic opacity-70" id="location-text"></p>
                        </div>

                        <div class="bg-white/50 p-4 border border-stone-200 rounded-sm shadow-sm text-sm">
                            <h4 class="font-display font-bold uppercase tracking-wider mb-3 border-b border-stone-100 pb-2">Archives</h4>
                            <div id="offsite-links" class="flex flex-col gap-1 text-sepia underline italic">
                                <!-- Links injected here -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Navigation Gallery -->
        <section class="mt-16">
            <div class="flex justify-between items-end mb-6 px-2">
                <div>
                    <h3 class="font-display text-xl">Historical Gallery</h3>
                    <p class="text-xs uppercase tracking-widest opacity-60">Cycle through the memories</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="scrollGallery(-1)" class="p-2 border border-stone-300 rounded hover:bg-stone-100">&larr;</button>
                    <button onclick="scrollGallery(1)" class="p-2 border border-stone-300 rounded hover:bg-stone-100">&rarr;</button>
                </div>
            </div>
            
            <div id="gallery-container" class="custom-scroll flex gap-6 overflow-x-auto snap-x pb-8 px-2 scroll-smooth">
                <!-- Thumbnails injected here -->
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="bg-stone-100 border-t border-stone-200 py-8 mt-auto">
        <div class="container mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-4">
            <p class="text-xs opacity-50 uppercase tracking-tighter">© 1892 - 1985 Heritage Records</p>
            <nav class="flex space-x-6 text-[10px] uppercase tracking-widest font-bold opacity-60">
                <a href="#" class="hover:text-sepia">Privacy</a>
                <a href="#" class="hover:text-sepia">Terms</a>
                <a href="#" class="hover:text-sepia">Sitemap</a>
                <a href="#" class="hover:text-sepia">Contribute</a>
            </nav>
        </div>
    </footer>

    <!-- Lightbox Modal -->
    <div id="lightbox" class="fixed inset-0 z-50 bg-black/90 flex items-center justify-center p-4">
        <button onclick="closeLightbox()" class="absolute top-6 right-6 text-white text-4xl">&times;</button>
        <img id="lightbox-img" src="" class="max-h-[90vh] max-w-full shadow-2xl animate-fade-in" alt="Enlarged view">
    </div>

    <script>
        const photos = [
            {
                id: 1,
                title: "Sunday Mornings at Boorman Hill",
                year: "1965",
                location: "Boorman Hill, Vermont",
                purpose: "Singing",
                format: "Black and White",
                editing: "Gemini AI Enhanced",
                snippet: "The echoes of the choir could be heard drifting down the valley every Sunday...",
                fullStory: "The echoes of the choir could be heard drifting down the valley every Sunday without fail. We would gather at the crest of Boorman Hill, the old chapel doors thrown wide to catch the summer breeze. It was more than just a gathering; it was the heartbeat of our little community. Mother wore her finest floral dress, and Father polished the truck until it gleamed. In this specific moment, the sun hit the lens just right, capturing the warmth that no amount of time can chill.",
                image: "https://images.unsplash.com/photo-1533154683836-84ea7a0bc310?auto=format&fit=crop&q=80&w=1000",
                links: ["Historical Society Record", "Family Geneology Tree"]
            },
            {
                id: 2,
                title: "The Old General Store",
                year: "1942",
                location: "Main Street Crossing",
                purpose: "Supplies",
                format: "Sepia Print",
                editing: "Original Archive",
                snippet: "Before the highway was built, this was the only place to get salt and stories...",
                fullStory: "Before the highway was built, this was the only place to get salt and stories. Mr. Henderson ran the counter for forty years. If you look closely at the window glass, you can see the reflection of the horses still tied to the hitching post outside. This was the day Grandpa finally bought the radio everyone had been talking about. The excitement in the air was thick as the dust on the floorboards.",
                image: "https://images.unsplash.com/photo-1563814040141-862bc7b0559a?auto=format&fit=crop&q=80&w=800",
                links: ["Main St History Museum", "Census Data 1940"]
            },
            {
                id: 3,
                title: "Departure of the Silver Streak",
                year: "1958",
                location: "Central Station",
                purpose: "Travel",
                format: "Kodachrome",
                editing: "Color Restored",
                snippet: "The steam was so thick you could barely see your own luggage on the platform...",
                fullStory: "The steam was so thick you could barely see your own luggage on the platform. It was the last of the great steam engines, a iron giant huffing its final breaths before the electric line took over. We were heading to the coast for the first time. I remember the smell of coal smoke and the shrill whistle that vibrated deep in your chest. It was a time of immense movement and hope.",
                image: "https://images.unsplash.com/photo-1520110120835-c96a9ef9569d?auto=format&fit=crop&q=80&w=800",
                links: ["Railway Heritage Site", "Travel Logs 1950s"]
            }
        ];

        let currentPhotoIndex = 0;
        let journalOpen = false;

        function init() {
            renderCurrentPhoto();
            renderGallery();
        }

        function renderCurrentPhoto() {
            const photo = photos[currentPhotoIndex];
            const container = document.getElementById('photo-display-container');
            
            container.innerHTML = `
                <div class="flex flex-col lg:flex-row gap-12 items-center">
                    <!-- Photo Frame -->
                    <div class="flex-1 w-full relative">
                        <div class="polaroid-frame mx-auto max-w-lg cursor-pointer" onclick="openLightbox('${photo.image}')">
                            <div class="relative group overflow-hidden">
                                <img src="${photo.image}" alt="${photo.title}" class="sepia-img w-full h-[400px] object-cover">
                                <div class="absolute top-3 right-3 opacity-0 group-hover:opacity-100 transition-opacity">
                                    <button class="bg-white/80 p-2 rounded-full shadow-lg hover:bg-white">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"></polyline><polyline points="9 21 3 21 3 15"></polyline><line x1="21" y1="3" x2="14" y2="10"></line><line x1="3" y1="21" x2="10" y2="14"></line></svg>
                                    </button>
                                </div>
                            </div>
                            <p class="font-script text-2xl text-center mt-6 text-stone-600">${photo.title}</p>
                            <p class="text-center text-xs uppercase tracking-widest opacity-40 mt-1">${photo.location} — ${photo.year}</p>
                        </div>
                    </div>

                    <!-- Intro Text -->
                    <div class="flex-1 space-y-6">
                        <span class="text-xs font-bold uppercase tracking-[0.3em] text-sepia">Memory Archive #${photo.id.toString().padStart(4, '0')}</span>
                        <h2 class="font-display text-4xl md:text-5xl leading-tight">${photo.title}</h2>
                        <p class="text-lg text-stone-600 italic leading-relaxed border-l-2 border-stone-200 pl-6">
                            "${photo.snippet}"
                        </p>
                        <button onclick="toggleJournal()" id="read-story-btn" class="flex items-center gap-2 px-8 py-3 bg-stone-800 text-white text-sm font-bold uppercase tracking-widest hover:bg-sepia transition-colors">
                            <span>Read Complete Story</span>
                            <svg id="chevron-icon" class="w-4 h-4 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </button>
                    </div>
                </div>
            `;

            // Setup Journal Content (hidden initially)
            const journalContent = document.getElementById('journal-content');
            journalContent.className = "text-lg text-stone-700 leading-relaxed italic drop-cap";
            journalContent.innerHTML = photo.fullStory;

            const metaInfo = document.getElementById('meta-info');
            metaInfo.innerHTML = `
                <p><strong>Date:</strong> ${photo.year}</p>
                <p><strong>Location:</strong> ${photo.location}</p>
                <p><strong>Purpose:</strong> ${photo.purpose}</p>
                <p><strong>Format:</strong> ${photo.format}</p>
                <p><strong>Editing:</strong> ${photo.editing}</p>
            `;

            document.getElementById('location-text').innerText = photo.location;

            const linksDiv = document.getElementById('offsite-links');
            linksDiv.innerHTML = photo.links.map(l => `<a href="#">${l}</a>`).join('');
            
            // Auto-collapse when switching photo
            journalOpen = false;
            document.getElementById('journal-section').classList.add('hidden');
        }

        function renderGallery() {
            const container = document.getElementById('gallery-container');
            container.innerHTML = photos.map((p, index) => `
                <div onclick="switchPhoto(${index})" class="flex-none w-64 snap-start cursor-pointer group">
                    <div class="bg-white p-2 border border-stone-200 shadow-sm transition-transform group-hover:-translate-y-2">
                        <div class="h-40 overflow-hidden bg-stone-100">
                            <img src="${p.image}" class="w-full h-full object-cover sepia-img grayscale opacity-70 group-hover:opacity-100 group-hover:grayscale-0" alt="${p.title}">
                        </div>
                        <div class="py-3 px-1">
                            <h4 class="font-display text-sm truncate">${p.title}</h4>
                            <p class="text-[10px] uppercase opacity-50 font-bold">${p.year} — ${p.location}</p>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function switchPhoto(index) {
            currentPhotoIndex = index;
            renderCurrentPhoto();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function toggleJournal() {
            journalOpen = !journalOpen;
            const section = document.getElementById('journal-section');
            const icon = document.getElementById('chevron-icon');
            const btnText = document.querySelector('#read-story-btn span');
            
            if (journalOpen) {
                section.classList.remove('hidden');
                icon.style.transform = 'rotate(180deg)';
                btnText.innerText = "Collapse Story";
                setTimeout(() => {
                    section.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }, 100);
            } else {
                section.classList.add('hidden');
                icon.style.transform = 'rotate(0deg)';
                btnText.innerText = "Read Complete Story";
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function scrollGallery(direction) {
            const container = document.getElementById('gallery-container');
            container.scrollBy({ left: direction * 300, behavior: 'smooth' });
        }

        function openLightbox(url) {
            document.getElementById('lightbox-img').src = url;
            document.getElementById('lightbox').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        // Close on Esc key
        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape") closeLightbox();
        });

        window.onload = init;
    </script>
</body>
</html>
