<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legacy Photo Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,700;1,400&family=Homemade+Apple&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #fdfaf3;
            --sepia: #8b5e3c;
            --sepia-light: #bc987e;
            --sepia-dark: #5d3a24;
        }

        body {
            background-color: var(--cream);
            color: var(--sepia-dark);
            font-family: 'Lora', serif;
            scroll-behavior: smooth;
        }

        .font-display { font-family: 'Playfair Display', serif; }
        .font-script { font-family: 'Homemade Apple', cursive; }

        /* Polaroid Effect */
        .polaroid-frame {
            background: white;
            padding: 1.5rem 1.5rem 4rem 1.5rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            transform: rotate(-1deg);
            transition: transform 0.3s ease;
        }
        .polaroid-frame:hover {
            transform: rotate(0deg);
        }

        /* Hover Transitions */
        .sepia-img {
            filter: sepia(100%) brightness(90%) contrast(90%);
            transition: filter 0.6s ease;
        }
        .sepia-img:hover {
            filter: sepia(0%) brightness(100%) contrast(100%);
        }

        /* Journal/Lined Paper Effect */
        .journal-paper {
            background-color: #fffdf5;
            background-image: linear-gradient(#e5e0d0 1px, transparent 1px);
            background-size: 100% 2.5rem;
            line-height: 2.5rem;
            padding: 2.5rem;
            border-left: 2px solid #d4cdb4;
            position: relative;
        }
        
        .drop-cap::first-letter {
            float: left;
            font-family: 'Playfair Display', serif;
            font-size: 4.5rem;
            line-height: 4rem;
            padding-right: 0.75rem;
            color: var(--sepia);
        }

        /* Custom Scrollbar */
        .custom-scroll::-webkit-scrollbar {
            height: 6px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: #eee6d8;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: var(--sepia-light);
            border-radius: 10px;
        }

        /* Map Placeholder Style */
        .map-box {
            background: #e8e2d4;
            border: 1px dashed var(--sepia);
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            color: var(--sepia);
        }

        /* Lightbox Blur */
        #lightbox {
            backdrop-filter: blur(8px);
            display: none;
        }
        
        .animate-fade-in {
            animation: fadeIn 0.4s ease forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .sticky-nav {
            background: rgba(253, 250, 243, 0.85);
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Header Navigation -->
    <header class="sticky-nav fixed top-0 w-full z-40 border-b border-stone-200">
        <nav class="container mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="font-display text-2xl font-bold tracking-tighter text-sepia">THE ARCHIVE</h1>
            <ul class="flex space-x-8 text-sm uppercase tracking-widest font-medium opacity-80">
                <li><a href="#" class="hover:text-sepia transition">Home</a></li>
                <li><a href="#" class="hover:text-sepia transition">Collections</a></li>
                <li><a href="#" class="hover:text-sepia transition">Timeline</a></li>
                <li><a href="#" class="hover:text-sepia transition">About</a></li>
            </ul>
        </nav>
    </header>

    <!-- Main Content Area -->
    <main class="flex-grow pt-24 pb-12 container mx-auto px-4">
        
        <div id="photo-display-container">
            <!-- Content Injected by JS -->
        </div>

        <!-- Journal Expansion Section (Conditional) -->
        <div id="journal-section" class="max-w-5xl mx-auto mt-12 hidden">
            <div class="journal-paper shadow-lg border border-stone-200">
                <div class="flex flex-col md:flex-row gap-8">
                    <!-- Text Content -->
                    <div class="flex-1">
                        <div id="journal-content" class="text-lg text-stone-700 leading-relaxed italic">
                            <!-- Story injected here -->
                        </div>
                    </div>
                    
                    <!-- Meta Column -->
                    <div class="w-full md:w-64 space-y-6">
                        <div class="bg-white/50 p-4 border border-stone-200 rounded-sm shadow-sm text-sm">
                            <h4 class="font-display font-bold uppercase tracking-wider mb-3 border-b border-stone-100 pb-2">Quick Info</h4>
                            <div id="meta-info" class="space-y-2">
                                <!-- Info injected here -->
                            </div>
                        </div>

                        <div class="bg-white/50 p-4 border border-stone-200 rounded-sm shadow-sm text-sm">
                            <h4 class="font-display font-bold uppercase tracking-wider mb-3 border-b border-stone-100 pb-2">Location</h4>
                            <div class="map-box mb-2">
                                [ Map Visualization ]
                            </div>
                            <p class="text-xs italic opacity-70" id="location-text"></p>
                        </div>

                        <div class="bg-white/50 p-4 border border-stone-200 rounded-sm shadow-sm text-sm">
                            <h4 class="font-display font-bold uppercase tracking-wider mb-3 border-b border-stone-100 pb-2">Archives</h4>
                            <div id="offsite-links" class="flex flex-col gap-1 text-sepia underline italic">
                                <!-- Links injected here -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Navigation Gallery -->
        <section class="mt-16">
            <div class="flex justify-between items-end mb-6 px-2">
                <div>
                    <h3 class="font-display text-xl">Historical Gallery</h3>
                    <p class="text-xs uppercase tracking-widest opacity-60">Cycle through the memories</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="scrollGallery(-1)" class="p-2 border border-stone-300 rounded hover:bg-stone-100">&larr;</button>
                    <button onclick="scrollGallery(1)" class="p-2 border border-stone-300 rounded hover:bg-stone-100">&rarr;</button>
                </div>
            </div>
            
            <div id="gallery-container" class="custom-scroll flex gap-6 overflow-x-auto snap-x pb-8 px-2 scroll-smooth">
                <!-- Thumbnails injected here -->
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="bg-stone-100 border-t border-stone-200 py-8 mt-auto">
        <div class="container mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-4">
            <p class="text-xs opacity-50 uppercase tracking-tighter">© 1892 - 1985 Heritage Records</p>
            <nav class="flex space-x-6 text-[10px] uppercase tracking-widest font-bold opacity-60">
                <a href="#" class="hover:text-sepia">Privacy</a>
                <a href="#" class="hover:text-sepia">Terms</a>
                <a href="#" class="hover:text-sepia">Sitemap</a>
                <a href="#" class="hover:text-sepia">Contribute</a>
            </nav>
        </div>
    </footer>

    <!-- Lightbox Modal -->
    <div id="lightbox" class="fixed inset-0 z-50 bg-black/90 flex items-center justify-center p-4">
        <button onclick="closeLightbox()" class="absolute top-6 right-6 text-white text-4xl">&times;</button>
        <img id="lightbox-img" src="" class="max-h-[90vh] max-w-full shadow-2xl animate-fade-in" alt="Enlarged view">
    </div>

    <script>
        const photos = [
            {
                id: 1,
                title: "Christmas Tree Season",
                year: "1965",
                location: "Boorman Peak, Vermont",
                purpose: "Christmas Tree Harvest",
                format: "Color",
                editing: "Gemini AI Enhanced",
                snippet: "The crisp autumn air bit at Cathy’s cheeks as she bent over the base of the tree...",
                fullStory: "The crisp autumn air bit at Cathy’s cheeks as she bent over the base of the tree, her dark gloves gripping the saw firmly. \
                The rhythmic back-and-forth motion sent the scent of fresh pine into the cold air. \
                Nearby, Doris stood, wiping her brow with the back of her sleeve, though the chill never truly let them warm up. \
                All day, they had been working below Boorman Peak, cutting and stacking Christmas trees bound for the valley market. \
                The pile of evergreens had grown steadily, the rich scent of pine needles filling the air around them. It was 1973, and this was \
                their yearly tradition—hard work in the woods before winter fully settled in. Cathy paused for a moment, resting on one knee. \
                She glanced down at her coat, now riddled with tiny holes from the sharp branches that seemed to appear from nowhere. \
                A sigh left her lips; those holes meant more cold seeping in as the days got even shorter. But there was no use complaining. \
                This was the work, and she took pride in it. As she sawed through one of the last trees of the day, she finally took a moment to gaze out over the valley below. \
                The landscape stretched out before her, bathed in the golden light of the setting sun. \
                Far in the distance, the small railroad stop of Batavia stood quiet. \
                Years ago, Christmas trees were loaded onto railcars there, bound for homes that would soon be filled with holiday cheer. \
                She imagined families untying the bundles, shaking loose the needles, and decorating each tree with care.\
                Doris approached, brushing sawdust from her flannel shirt. That’s the last of them, she said, nodding toward the stacked trees. \
                Let’s head down. \
                Their truck groaned as it maneuvered the rough roads, descending toward the valley. \
                Though the work had been exhausting, there was a quiet satisfaction in knowing they had done well. \
                The trees would bring joy to many, and as Cathy watched the last light fade behind the mountains, she felt a peaceful sense of accomplishment.\
                Christmas was still weeks away, but tonight, in the hush of the woods, it felt closer than ever.",
                image: "images/cathy_tree.jpg",
                links: ["Historical Society Record", "Family Geneology Tree"]
            },
            {
                id: 2,
                title: "Life on the Farm",
                year: "1942",
                location: "Three Hills Alberta",
                purpose: "Milking Cows",
                format: "Color",
                editing: "Original Archive",
                snippet: "The barn’s earthy scent mingled with the faint aroma of hay, creating a setting that was both serene and purposeful...",
                fullStory: "In the quiet rural town of Three Hills, Alberta, the year 1977 marked a time when neighbors looked out for one another in the truest sense of community. \
                The warm hues of early morning bathed the light brown Jersey cow as it stood patiently in its barn, its soft eyes glancing around as if understanding the importance of its role. This cow, a trusted source of nourishment, was being milked by hand—a rare sight even for that time.\
                <br><br>Pat, a determined and compassionate figure, had stepped in to help during a moment of need. The cow's owner was sick and hospitalized, leaving her unable to tend to her daily chores. Without hesitation, Pat volunteered to take on the task, bringing a sense of calm and continuity to the farm. \
                Pat sat on a one-legged stool, a simple yet essential tool for the job, and positioned herself beside the Jersey cow. Her hands worked rhythmically, the sound of milk hitting the metal bucket echoing softly in the barn.\
                <br><br>Behind her sat Martin, just three years old, on a little stool, dressed in a striped shirt and blue pants. He held the cow's tail firmly but gently, ensuring it didn’t swat Pat in the face. \
                The tail twitched occasionally, a reflex the cow couldn’t control, but Martin’s steady grip kept it from becoming a nuisance. His position behind the cow might not have been the most glamorous, but his role was equally important to the task at hand.\
                <br><br>The barn’s earthy scent mingled with the faint aroma of hay, creating a setting that was both serene and purposeful. The soft lowing of the cow added to the rustic ambiance. \
                The cooperation between Pat and Martin was a testament to their shared dedication and the unspoken bond that arises in times of need.\
                <br><br>This simple act of milking the Jersey cow transcended the mundane. It was a moment that symbolized the strength of community and the kindness of human spirit. \
                Pat and Martin’s teamwork ensured that the sick woman’s cow was cared for, preserving a small but vital part of her livelihood. In the rural tapestry of Three Hills, Alberta, this story became a thread that highlighted the enduring values of empathy, responsibility, and friendship.",
                image: "images/milking_crop.JPG",
                links: ["Main St History Museum", "Census Data 1940"]
            },
            {
                id: 3,
                title: "Cousins Photo Day",
                year: "1952",
                location: "Eastern Montana",
                purpose: "Cousins Meeting",
                format: "Black and White",
                editing: "Color Restored",
                snippet: "Helen, just six years old, couldn’t contain her excitement. She spun around in her blue-and-white dress...",
                fullStory: "It was a crisp, sunny April morning in 1952, and the farmstead near Savage, Montana, buzzed with the chatter and energy of four young cousins. \
                The farmhouse porch, with its weathered wooden rails and the wide prairie stretching endlessly beyond, had been chosen as the perfect spot for a family photograph. \
                <br><br>Helen, just six years old, couldn’t contain her excitement. She spun around in her blue-and-white dress, the hem swirling as her giggles filled the air. \
                “Grandma says this is going to be the best picture ever!” she exclaimed, her big smile as bright as the spring sun overhead.\
                <br><br>Julia, eight years old, stood a little taller beside her. She wore a dress similar to Helen’s, her hair brushed smooth and neatly tied back. \
                Though she was more reserved, Julia felt a quiet thrill at the thought of being photographed. She tucked her hands in front of her, already imagining how the picture would look on Grandma’s mantle.\
                <br><br>Leona, Helen’s age, fidgeted with the sleeves of her blue sweater. She wasn’t as sure about the idea of standing still for a photo, but she’d dutifully put on her nicest dress and let her mother comb her hair. \
                Leona stepped into her place on the porch, glancing up to see David, the oldest, standing on the step behind her.\
                <br><br>David, at eight, exuded a calm confidence. He wore his dress pants and a crisp white shirt, topped with a dark sweater. \
                Standing a step higher than the others, he kept a watchful eye on his younger cousins, especially Leona, who looked like she might dart away at any moment. His steady presence added a quiet order to the scene.\
                <br><br>“All right, everyone, line up!” their mother called, her voice warm yet firm as she adjusted the camera on its tripod.\
                <br><br>David stood directly behind Leona, placing a hand lightly on her shoulder to steady her. Julia took her spot next to Leona, clasping her hands neatly, while Helen bounded into place at the end of the row, barely able to keep her feet still.\
                <br><br>“Say ‘cheese!’”\
                <br><br>“Cheese!” they chorused—though Helen’s sounded more like a shout, and Leona’s was barely a whisper. The camera clicked, capturing the moment.\
                <br><br>The photograph would later show a perfect tableau of childhood on a spring Sunday: Helen’s radiant grin, Julia’s quiet composure, Leona’s shy uncertainty softened by David’s protective stance. \
                It became a treasured memory of that April morning on the farm, where four cousins stood together against the vast Montana sky, their bonds as strong as the prairie winds.",
                image: "images/kids_color.jpg",
                links: ["Railway Heritage Site", "Travel Logs 1950s"]
            },
            {
                id: 4,
                title: "The Class Photo",
                year: "1962",
                location: "Boorman School",
                purpose: "Class Photo",
                format: "Black and White",
                editing: "Color Restored",
                snippet: "The school had only eight students in the sixth grade, which made it more like a family than a classroom...",
                fullStory: "It was an early autumn morning in the early 1960s, the kind of morning that still held a little summer warmth, but hinted at the chill of fall just around the corner. \
                Doris stood with her classmates on the steps of Boorman School, their small country school nestled in the heart of the northwestern Montana mountains. \
                The school, a modest one-room building, stood as a silent witness to decades of children's laughter, games, and memories. \
                <br><br>Today, though, it was all about the class photo. The school had only eight students in the sixth grade, which made it more like a family than a classroom. \
                Doris, the tallest of them all, stood on the second step, beaming with excitement. There was Tommy, with his wild hair and mischievous grin, standing proudly on the top step. \
                Beside him was Sarah, her braids neatly tied, her hands folded primly in her lap. On the lowest step, Ellie and Pete sat with their arms around each other, whispering and giggling as they waited for the photographer to give the signal. \
                <br><br>Their teacher, Mrs. Thompson, stood at the top of the steps just behind them, making sure everyone was in line, trying to calm the squirming excitement of the young children. \
                She wore a simple dress, a reminder of how things were simpler in Boorman, and held a clipboard in her hands, checking that all the children were there, as if one of them could slip away and ruin the moment.\
                <br><br>Doris couldn’t stop smiling. She loved these moments—these small, ordinary moments that felt so special when they happened. Today, though, was something different. It wasn’t just a regular school day. \
                It was a day when their class would be frozen in time, their faces captured for eternity in a single photograph.\
                <br><br>The photographer, a man from the next town over, had arrived early that morning. He set up his camera in front of the school's single white wood door, the one that had seen generations of children come and go. \
                Above it, a weathered old wooden sign hung, its paint chipped and faded. It read: 'Boorman School.' It was simple, just like everything else about the place, but it made Doris proud.\
                <br><br>The door, Doris thought, was a gateway not just to the school, but to the community that had raised them. \
                For so many years, that door had framed the smiles of kids just like her—kids who lived in small cabins and farmhouses, who trekked through the mountains in all kinds of weather, who knew what it meant to be close to nature and to each other. \
                The steps in front of that door had been used for decades as a backdrop for class photos, each one marking a different generation, but all of them bound by the same simple joys and challenges of life in the hills.\
                <br><br>'Hold still now,' Mrs. Thompson called out, her voice carrying the faintest hint of a smile as she adjusted her glasses. \
                <br><br>Doris straightened up, trying her best to look poised and grown-up, though she could feel her knees wobbling with excitement. She and her friends had been talking about this photo for days. Would it turn out well? Would they look silly? \
                <br><br>But most of all, Doris thought, *Would it be a memory they could keep forever?*\
                <br><br>The photographer adjusted the lens and squinted at them through the viewfinder. 'Ready now,' he said, with a nod. \
                <br><br>*Click.* \
                <br><br>The camera snapped, and Doris could almost hear the sound of time itself capturing the moment—freezing it, preserving it like an old postcard from the past. \
                <br><br>The children were still for just a second longer, then a ripple of giggles broke out as they all turned to each other. \
                <br><br>“It’s done,” Doris said with a sigh of relief, looking at the others. \"I think it turned out good.\" \
                <br><br>Tommy jumped off the top step and grinned. “I bet our picture’s going to be up on that wall forever. Just like the ones before us.”\
                <br><br>Everyone turned to look at the photos hanging inside the school—the faded, framed images of former classes, their smiling faces almost lost in time. \
                Doris had always wondered what it would feel like to be one of those kids, those kids who had come before her. Now she would be one of them.\
                <br><br>As they filed back into the school, their laughter echoing off the old wood walls, Doris felt a sudden burst of pride. \
                The mountains stood tall and quiet behind them, but it was the people, the community, the moments like these, that made Boorman School truly special.\
                <br><br>And for a brief moment, Doris could almost imagine herself, years from now, walking up those same steps, showing her own children a photograph of the class of 1962—her class—and telling them, *\"That’s me, right there, on the second step, in front of the door to Boorman School.\"* \
                <br><br>It was a simple moment, but it was hers, and it would last forever.",
                image: "images/doris_boorman_school.png",
                links: ["Railway Heritage Site", "Travel Logs 1950s"]
            }
        ];

        let currentPhotoIndex = 0;
        let journalOpen = false;

        function init() {
            renderCurrentPhoto();
            renderGallery();
        }

        function renderCurrentPhoto() {
            const photo = photos[currentPhotoIndex];
            const container = document.getElementById('photo-display-container');
            
            container.innerHTML = `
                <div class="flex flex-col lg:flex-row gap-12 items-center">
                    <!-- Photo Frame -->
                    <div class="flex-1 w-full relative">
                        <div class="polaroid-frame mx-auto max-w-lg cursor-pointer" onclick="openLightbox('${photo.image}')">
                            <div class="relative group overflow-hidden">
                                <img src="${photo.image}" alt="${photo.title}" class="sepia-img w-full h-[400px] object-cover">
                                <div class="absolute top-3 right-3 opacity-0 group-hover:opacity-100 transition-opacity">
                                    <button class="bg-white/80 p-2 rounded-full shadow-lg hover:bg-white">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"></polyline><polyline points="9 21 3 21 3 15"></polyline><line x1="21" y1="3" x2="14" y2="10"></line><line x1="3" y1="21" x2="10" y2="14"></line></svg>
                                    </button>
                                </div>
                            </div>
                            <p class="font-script text-2xl text-center mt-6 text-stone-600">${photo.title}</p>
                            <p class="text-center text-xs uppercase tracking-widest opacity-40 mt-1">${photo.location} — ${photo.year}</p>
                        </div>
                    </div>

                    <!-- Intro Text -->
                    <div class="flex-1 space-y-6">
                        <span class="text-xs font-bold uppercase tracking-[0.3em] text-sepia">Memory Archive #${photo.id.toString().padStart(4, '0')}</span>
                        <h2 class="font-display text-4xl md:text-5xl leading-tight">${photo.title}</h2>
                        <p class="text-lg text-stone-600 italic leading-relaxed border-l-2 border-stone-200 pl-6">
                            "${photo.snippet}"
                        </p>
                        <button onclick="toggleJournal()" id="read-story-btn" class="flex items-center gap-2 px-8 py-3 bg-stone-800 text-white text-sm font-bold uppercase tracking-widest hover:bg-sepia transition-colors">
                            <span>Read Complete Story</span>
                            <svg id="chevron-icon" class="w-4 h-4 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </button>
                    </div>
                </div>
            `;

            // Setup Journal Content (hidden initially)
            const journalContent = document.getElementById('journal-content');
            journalContent.className = "text-lg text-stone-700 leading-relaxed italic drop-cap";
            journalContent.innerHTML = photo.fullStory;

            const metaInfo = document.getElementById('meta-info');
            metaInfo.innerHTML = `
                <p><strong>Date:</strong> ${photo.year}</p>
                <p><strong>Location:</strong> ${photo.location}</p>
                <p><strong>Purpose:</strong> ${photo.purpose}</p>
                <p><strong>Format:</strong> ${photo.format}</p>
                <p><strong>Editing:</strong> ${photo.editing}</p>
            `;

            document.getElementById('location-text').innerText = photo.location;

            const linksDiv = document.getElementById('offsite-links');
            linksDiv.innerHTML = photo.links.map(l => `<a href="#">${l}</a>`).join('');
            
            // Auto-collapse when switching photo
            journalOpen = false;
            document.getElementById('journal-section').classList.add('hidden');
        }

        function renderGallery() {
            const container = document.getElementById('gallery-container');
            container.innerHTML = photos.map((p, index) => `
                <div onclick="switchPhoto(${index})" class="flex-none w-64 snap-start cursor-pointer group">
                    <div class="bg-white p-2 border border-stone-200 shadow-sm transition-transform group-hover:-translate-y-2">
                        <div class="h-40 overflow-hidden bg-stone-100">
                            <img src="${p.image}" class="w-full h-full object-cover sepia-img grayscale opacity-70 group-hover:opacity-100 group-hover:grayscale-0" alt="${p.title}">
                        </div>
                        <div class="py-3 px-1">
                            <h4 class="font-display text-sm truncate">${p.title}</h4>
                            <p class="text-[10px] uppercase opacity-50 font-bold">${p.year} — ${p.location}</p>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function switchPhoto(index) {
            currentPhotoIndex = index;
            renderCurrentPhoto();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function toggleJournal() {
            journalOpen = !journalOpen;
            const section = document.getElementById('journal-section');
            const icon = document.getElementById('chevron-icon');
            const btnText = document.querySelector('#read-story-btn span');
            
            if (journalOpen) {
                section.classList.remove('hidden');
                icon.style.transform = 'rotate(180deg)';
                btnText.innerText = "Collapse Story";
                setTimeout(() => {
                    section.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }, 100);
            } else {
                section.classList.add('hidden');
                icon.style.transform = 'rotate(0deg)';
                btnText.innerText = "Read Complete Story";
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function scrollGallery(direction) {
            const container = document.getElementById('gallery-container');
            container.scrollBy({ left: direction * 300, behavior: 'smooth' });
        }

        function openLightbox(url) {
            document.getElementById('lightbox-img').src = url;
            document.getElementById('lightbox').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        // Close on Esc key
        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape") closeLightbox();
        });

        window.onload = init;
